# Plugin Manifest - Command Plugin with Secret
# Human-readable title: "Command Plugin with Secret"
# See docs/PLUGIN_CONTRACT.md for manifest specification

name: example_command_with_secret
version: "1.0.0"
description: Example plugin demonstrating secret configuration usage
min_bot_version: "1.0.0"

author: AMO Team

commands:
  - weather

required_roles:
  - normal
required_permissions:
  - send_message

settings_schema:
  api_key:
    type: secret
    required: true
    description: API key for weather service (encrypted storage)
  default_city:
    type: text
    required: false
    default: "Berlin"
    description: Default city for weather queries
  units:
    type: select
    required: true
    default: "metric"
    options:
      - metric
      - imperial
      - kelvin
    description: Temperature display format
  cache_enabled:
    type: bool
    required: false
    default: true
    description: Cache weather data for 10 minutes
