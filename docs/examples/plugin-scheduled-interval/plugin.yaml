# Plugin Manifest - Scheduled Interval Plugin
# Human-readable title: "Scheduled Interval Plugin"
# See docs/PLUGIN_CONTRACT.md for manifest specification

name: example_scheduled_interval
version: "1.0.0"
description: A scheduled plugin that runs at fixed intervals
min_bot_version: "1.0.0"

author: AMO Team

schedule:
  interval_seconds: 300

required_roles:
  - admin
required_permissions:
  - send_message

settings_schema:
  target_group:
    type: text
    required: true
    description: Group ID where messages will be sent
  message_template:
    type: text
    required: true
    default: "⏰ Scheduled check at {timestamp}"
    description: Template for the scheduled message
  enabled:
    type: bool
    required: false
    default: true
    description: Whether to send messages on schedule
